networks:
  app-network:
    driver: bridge

volumes:
  HNG-nginx-logs:
    driver: local
  nextcloud-data:
    driver: local

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=${SERVER_IP:-localhost}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  detector:
    build: ./detector
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
      - /var/log/detector:/var/log/detector
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
